<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />
        <link rel="stylesheet" href="./styles/style.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        />
        <title>
            Frontend Mentor | Huddle landing page with single introductory
            section
        </title>
    </head>
    <body>
        <header>
            <img src="./images/logo.svg" alt="logo" />
        </header>
        <main>
            <img src="./images/illustration-mockups.svg" alt="mockup" />
            <div class="wrapper">
                <h1>Build The Community Your Fans Will Love</h1>
                <p>
                    Huddle re-imagines the way we build communities. You have a
                    voice, but so does your audience. Create connections with
                    your users as you engage in genuine discussion.
                </p>
                <button class="register-btn">Register</button>
            </div>
        </main>
        <div class="links">
            <a href=""
                ><span><i class="fab fa-facebook" aria-hidden="true"></i></span
            ></a>
            <a href=""
                ><span><i class="fab fa-twitter" aria-hidden="true"></i></span
            ></a>
            <a href=""
                ><span><i class="fab fa-instagram" aria-hidden="true"></i></span
            ></a>
        </div>
        <footer class="attribution">
            Challenge by
            <a
                href="https://www.frontendmentor.io?ref=challenge"
                target="_blank"
                rel="noopener noreferrer"
                >Frontend Mentor</a
            >. Coded by
            <a
                href="https://github.com/ShamardinaEM"
                target="_blank"
                rel="noopener noreferrer"
                >ShamardinaEM</a
            >.
        </footer>
    </body>
</html>
